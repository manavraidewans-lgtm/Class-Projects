<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Input Form -->
    <div class="form-box">

        <h2>Student Details</h2>

        <label>Student Name</label>
        <input type="text" id="name" placeholder="Enter Name">

        <label>Physics</label>
        <input type="number" id="phy" placeholder="0-100">

        <label>Chemistry</label>
        <input type="number" id="che" placeholder="0-100">

        <label>Mathematics</label>
        <input type="number" id="maths" placeholder="0-100">

        <label>Biology</label>
        <input type="number" id="bio" placeholder="0-100">

        <label>Hindi</label>
        <input type="number" id="hindi" placeholder="0-100">

        <button onclick="generate(event)">Generate Report Card</button>

    </div>

    <!-- Report Card -->
    <div id="reportCard">


    </div>

</div>

<script src="app.js"></script>

</body>
</html>
