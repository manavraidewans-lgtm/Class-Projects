<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/all.min.css" integrity="sha512-F/yRpRY8sctKzP7exU5PLGejwg/QtjDX6CIy/41nApe7JqdZgCcCzJTNq9Rcp/XwbeeTGillGevBakruY15pxA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body id="background ">

    <div class="calc-outer" id="calc-background">
        <div class="close">
            <button class="clo up-but">
                <p>X</p>
            </button>
        </div>
       <div class="upper">
        <div class="upper-display">
            <input type="text" id="output" placeholder="0" readonly>
        </div>
       </div>
       <div class="lower">
        <div class="lower-buttons">
            <button id="back">back</button>
            <button id="clear" onclick="clearDisplay()">AC</button>
            <button id="multi" class="assing" onclick="operator('*')">X</button>
            <button id="div" class="assing" onclick="operator('/')">/</button>
            <button id="add" class="assing" onclick="operator('+')">+</button>
            <button id="1" class="button-color" onclick="firstNumber('1')">1</button>
            <button id="2" class="button-color" onclick="firstNumber('2')">2</button>
            <button id="3" class="button-color" onclick="firstNumber('3')">3</button>
            <button id="4" class="button-color" onclick="firstNumber('4')">4</button>
            <button id="sub" class="assing" onclick="operator('-')">-</button>
            <button id="5" class="button-color" onclick="firstNumber('5')">5</button>
            <button id="6" class="button-color" onclick="firstNumber('6')">6</button>
            <button id="7" class="button-color" onclick="firstNumber('7')">7</button>
            <button id="8" class="button-color" onclick="firstNumber('8')">8</button>
            <button id="modulo" class="assing" onclick="operator('%')">%</button>
            <button id="9" class="button-color" onclick="firstNumber('9')">9</button>
            <button id="0" class="button-color" onclick="firstNumber('0')">0</button>
            <button id="change-color" onclick="changeColor()" class="button-color">change Color</button>
            <button id="decimal" class="assing" onclick="firstNumber('.')">.</button>
            <button id="ans" class="assing" onclick="result()">=</button>    
        </div>
       </div>
    </div>


    <script src="logic.js"></script>
</body>
</html>
