<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/all.min.css" integrity="sha512-F/yRpRY8sctKzP7exU5PLGejwg/QtjDX6CIy/41nApe7JqdZgCcCzJTNq9Rcp/XwbeeTGillGevBakruY15pxA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div class="calc-outer" id="calc-background">
        <div class="close">
            <button class="clo up-but">
                <p>X</p>
            </button>
        </div>
       <div class="upper">
        <div class="upper-display">
            <input type="number" id="number" placeholder="0">
        </div>
       </div>
       <div class="lower">
        <div class="lower-buttons">
            <button id="back">back</button>
            <button id="clear">AC</button>
            <button id="multi" class="assing">X</button>
            <button id="div" class="assing">/</button>
            <button id="add" class="assing">+</button>
            <button id="1">1</button>
            <button id="2">2</button>
            <button id="3">3</button>
            <button id="4">4</button>
            <button id="sub" class="assing">-</button>
            <button id="5">5</button>
            <button id="6">6</button>
            <button id="7">7</button>
            <button id="8">8</button>
            <button id="modulo" class="assing">%</button>
            <button id="9">9</button>
            <button id="0">0</button>
            <button id="change-color" onclick="changeColor()">change Color</button>
            <button id="decimal" class="assing">.</button>
            <button id="ans" class="assing">=</button>    
        </div>
       </div>
    </div>


    <script src="logic.js"></script>
</body>
</html>
